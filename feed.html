<div id="blog-folyam" class="rendszervaltas-feed">
  </div>

<script>
  // Teszt adatok szimulálása (később: fetch('posztok.json'))
  const posztok = [
    {
      id: 1,
      datum: "2026. MÁRCIUS 12.",
      cim: "AZ ELKERÜLHETETLEN ELSZÁMOLÁS",
      kivonat: "A régi struktúrák repedeznek. A visszaszámláló nem csak az időt méri, hanem a felelősségvállalás közeledtét is.",
      szint: "KRITIKUS"
    }
  ];

  const container = document.getElementById('blog-folyam');

  posztok.forEach(poszt => {
    container.innerHTML += `
      <article style="border-left: 5px solid red; padding: 20px; margin-bottom: 30px; background: #f4f4f4;">
        <small style="font-weight: bold; color: #666;">[ ${poszt.datum} ] — ÁLLAPOT: ${poszt.szint}</small>
        <h2 style="margin: 10px 0; font-family: 'Courier New', monospace;">${poszt.cim}</h2>
        <p style="line-height: 1.6;">${poszt.kivonat}</p>
        <a href="posztok/${poszt.id}.html" style="color: black; font-weight: bold; text-decoration: underline;">Tovább a teljes tényfeltáráshoz...</a>
      </article>
    `;
  });
</script>
