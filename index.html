<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>RENDSZERVÁLTÁS 2026</title>
    <meta name="description" content="2026. Április 12. - A nap, amikor visszavettük a jövőnket. Kövesd a rendszerváltás óta eltelt időt!">
    <meta property="og:title" content="RENDSZERVÁLTÁS 2026">
    <meta property="og:description" content="A korszakváltás elkezdődött. Kövesd az új korszak óta eltelt időt!">
    <meta property="og:image" content="tomegfoto.jpg"> 
    <meta property="og:url" content="https://rendszer-valtas.hu">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-light: #00f2ff;
            --cyan-dark: #008891;
            --h-red: #ff3b3b;
            --h-green: #00ff88;
            --bg-dark: #01050a;
            --glass-hero: rgba(0, 0, 0, 0.75);
            --neon-text: 0 0 20px rgba(0, 242, 255, 0.8);
            --neon-red: 0 0 25px rgba(255, 59, 59, 0.9), 0 0 10px rgba(255, 59, 59, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-image: url('tomegfoto.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
        }
        .bg-overlay-fix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background: radial-gradient(circle at center, rgba(1, 5, 10, 0.3) 0%, var(--bg-dark) 130%);
        }
        .hero-section { 
            text-align: center; width: 95%; max-width: 1100px; 
            padding: 80px 20px;
            background: var(--glass-hero); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 6px solid var(--h-red); border-bottom: 6px solid var(--h-green);
            box-shadow: 0 50px 100px rgba(0,0,0,0.95);
            border-radius: 8px;
        }
        .main-title {
            font-size: clamp(32px, 8vw, 85px); font-weight: 900; letter-spacing: 6px;
            margin-bottom: 25px; color: #fff; text-shadow: var(--neon-text);
        }
        .target-label {
            font-size: clamp(16px, 3vw, 28px); letter-spacing: 4px; 
            color: var(--h-red); margin-bottom: 60px; text-transform: uppercase; 
            font-weight: 900; text-shadow: var(--neon-red);
            line-height: 1.4;
        }
        .countdown-grid { display: flex; width: 100%; justify-content: center; align-items: center; gap: 10px; }
        .time-box { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .time-value { font-weight: 900; font-size: clamp(45px, 12vw, 140px); color: #fff; line-height: 0.8; text-shadow: var(--neon-text); }
        .time-label { font-size: clamp(10px, 1.6vw, 18px); color: #fff; text-transform: uppercase; margin-top: 20px; letter-spacing: 3px; font-weight: 600; opacity: 0.95; }
        .quartz-sep { font-size: clamp(35px, 9vw, 110px); color: var(--cyan-light); font-weight: 900; padding-bottom: 25px; opacity: 0.6; animation: blink 1.5s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }
        
        footer { 
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 11px; letter-spacing: 3px; opacity: 0.6; font-weight: 600;
        }
        @media (max-width: 850px) {
            .countdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px 15px; }
            .quartz-sep { display: none; }
            body { padding: 40px 0; }
            footer { position: relative; margin-top: 40px; bottom: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay-fix"></div>

    <main class="hero-section">
        <h1 class="main-title">RENDSZERVÁLTÁS</h1>
        <div class="target-label">A RENDSZERVÁLTÁS ÓTA ELTELT:</div>
        
        <div class="countdown-grid">
            <div class="time-box"><span class="time-value" id="d">00</span><span class="time-label">Nap</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="h">00</span><span class="time-label">Óra</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="m">00</span><span class="time-label">Perc</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="s">00</span><span class="time-label">Másodperc</span></div>
        </div>
    </main>

    <footer>
        <p>© 2026 RENDSZER-VALTAS.HU</p>
    </footer>

    <script>
        // Fix kezdődátum ISO formátumban: 2026. április 12. 06:00:00 (A rendszerváltás hivatalos pillanata)
        const target = new Date("2026-04-12T06:00:00").getTime();
        
        function update() {
            const now = new Date().getTime();
            const diff = now - target;
            
            if (diff < 0) {
                document.getElementById('d').innerText = "00";
                document.getElementById('h').innerText = "00";
                document.getElementById('m').innerText = "00";
                document.getElementById('s').innerText = "00";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('d').innerText = d.toString().padStart(2, '0');
            document.getElementById('h').innerText = h.toString().padStart(2, '0');
            document.getElementById('m').innerText = m.toString().padStart(2, '0');
            document.getElementById('s').innerText = s.toString().padStart(2, '0');
        }

        // Azonnali indítás és másodpercenkénti frissítés
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
