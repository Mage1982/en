<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>RENDSZERVÁLTÁS 2026</title>
    <meta name="description" content="2026. Április 12. - A nap, amikor visszavettük a jövőnket. Kövesd a rendszerváltás óta eltelt időt!">
    <meta property="og:title" content="RENDSZERVÁLTÁS 2026">
    <meta property="og:description" content="A korszakváltás elkezdődött. Kövesd az új korszak óta eltelt időt!">
    <meta property="og:image" content="tomeg.jpg"> 
    <meta property="og:url" content="https://rendszer-valtas.hu">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-light: #00f2ff;
            --cyan-dark: #008891;
            --h-red: #ff3b3b;
            --h-green: #00ff88;
            --bg-dark: #01050a;
            --glass-hero: rgba(0, 0, 0, 0.85);
            --neon-text: 0 0 20px rgba(0, 242, 255, 0.8);
            --neon-red: 0 0 25px rgba(255, 59, 59, 0.9), 0 0 10px rgba(255, 59, 59, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-image: url('tomeg.jpg');
            background-attachment: fixed;
            background-size: 115% auto;
            background-position: center 20%;
            background-repeat: no-repeat;
            padding: 20px 10px;
        }
        .bg-overlay-fix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background: radial-gradient(circle at center, rgba(1, 5, 10, 0.3) 0%, var(--bg-dark) 130%);
        }
        .hero-section { 
            text-align: center; 
            width: 100%; 
            max-width: 1100px; 
            padding: 60px 15px;
            background: var(--glass-hero); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 6px solid var(--h-red); 
            border-bottom: 6px solid var(--h-green);
            box-shadow: 0 50px 100px rgba(0,0,0,0.95);
            border-radius: 8px;
            overflow: hidden; /* Biztonsági zár */
        }
        .main-title {
            font-size: clamp(28px, 7vw, 85px); 
            font-weight: 900; 
            letter-spacing: 4px;
            margin-bottom: 25px; 
            color: #fff; 
            text-shadow: var(--neon-text);
            line-height: 1.2;
        }
        .target-label {
            font-size: clamp(14px, 2.5vw, 24px); 
            letter-spacing: 2px; 
            color: var(--h-red); 
            margin-bottom: 50px; 
            text-transform: uppercase; 
            font-weight: 900; 
            text-shadow: var(--neon-red);
            line-height: 1.4;
            padding: 0 10px;
        }
        .countdown-grid { 
            display: flex; 
            width: 100%; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
        }
        .time-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: 1; 
            min-width: 0; /* Megakadályozza, hogy a flex elem túlnyúljon */
        }
        .time-value { 
            font-weight: 900; 
            font-size: clamp(38px, 9vw, 130px); 
            color: #fff; 
            line-height: 0.9; 
            text-shadow: var(--neon-text); 
            overflow-wrap: break-word;
            word-break: break-all;
        }
        .time-label { 
            font-size: clamp(9px, 1.5vw, 16px); 
            color: #fff; 
            text-transform: uppercase; 
            margin-top: 15px; 
            letter-spacing: 2px; 
            font-weight: 600; 
            opacity: 0.95; 
        }
        .quartz-sep { 
            font-size: clamp(30px, 7vw, 100px); 
            color: var(--cyan-light); 
            font-weight: 900; 
            padding-bottom: 20px; 
            opacity: 0.6; 
            animation: blink 1.5s infinite; 
        }
        
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }
        
        footer { 
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 11px; letter-spacing: 3px; opacity: 0.6; font-weight: 600;
        }

        /* Mobil és Tablet nézet finomhangolása */
        @media (max-width: 850px) {
            body { 
                background-size: cover; 
                padding: 20px 10px; 
            }
            .hero-section {
                padding: 40px 10px;
            }
            .countdown-grid { 
                display: grid; 
                grid-template-columns: repeat(2, 1fr); 
                gap: 30px 10px; 
            }
            /* A napok száma (idővel 3-4 jegyű is lehet), adjunk neki picit több teret */
            .time-value {
                font-size: clamp(40px, 14vw, 75px);
            }
            .quartz-sep { display: none; }
            footer { position: relative; margin-top: 40px; bottom: 0; }
        }

        /* Egészen apró mobilokhoz (pl. iPhone SE) */
        @media (max-width: 360px) {
            .main-title { font-size: 24px; letter-spacing: 2px; }
            .target-label { font-size: 12px; }
            .time-value { font-size: 38px; }
            .time-label { font-size: 9px; letter-spacing: 1px; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay-fix"></div>

    <main class="hero-section">
        <h1 class="main-title">RENDSZERVÁLTÁS</h1>
        <div class="target-label">A RENDSZERVÁLTÁS ÓTA ELTELT:</div>
        
        <div class="countdown-grid">
            <div class="time-box"><span class="time-value" id="d">00</span><span class="time-label">Nap</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="h">00</span><span class="time-label">Óra</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="m">00</span><span class="time-label">Perc</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="s">00</span><span class="time-label">Másodperc</span></div>
        </div>
    </main>

    <footer>
        <p>© 2026 RENDSZER-VALTAS.HU</p>
    </footer>

    <script>
        const target = new Date("2026/04/12 06:00:00").getTime();
        
        function update() {
            const now = new Date().getTime();
            const diff = now - target;
            const absoluteDiff = Math.abs(diff);

            const d = Math.floor(absoluteDiff / (1000 * 60 * 60 * 24));
            const h = Math.floor((absoluteDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((absoluteDiff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((absoluteDiff % (1000 * 60)) / 1000);

            document.getElementById('d').innerText = d.toString().padStart(2, '0');
            document.getElementById('h').innerText = h.toString().padStart(2, '0');
            document.getElementById('m').innerText = m.toString().padStart(2, '0');
            document.getElementById('s').innerText = s.toString().padStart(2, '0');
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
