<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>RENDSZERVÁLTÁS 2026</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <meta property="og:title" content="RENDSZERVÁLTÁS 2026">
    <meta property="og:image" content="https://rendszer-valtas.hu/social.jpg">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --digit-color: #00f2ff;
            --h-red: #ce1126;
            --h-green: #008751;
            --h-white: #ffffff;
            --bg-dark: #000205; /* Még sötétebb alap */
            --glass: rgba(0, 4, 10, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* HÁTTÉR - SÖTÉTÍTETT RÉTEG A JOBB OLVASHATÓSÁGÉRT */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background-image: url('social.jpg');
            background-size: cover; background-position: center; 
            opacity: 0.45; /* Visszavéve, hogy ne legyen tolakodó */
        }

        .bg-overlay-fix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background: radial-gradient(circle at center, rgba(0,2,5,0.4) 0%, var(--bg-dark) 90%);
        }

        /* NAVBAR */
        header {
            width: 100%; padding: 15px 0; position: sticky; top: 0; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--h-white);
        }

        .nav-container { 
            display: flex; justify-content: center; gap: clamp(10px, 3vw, 30px); 
            max-width: 1100px; margin: 0 auto; padding: 0 15px;
        }

        .menu-trigger {
            background: transparent; border: 1px solid var(--digit-color);
            color: var(--digit-color); padding: 12px 28px;
            font-family: 'Orbitron', sans-serif; font-size: clamp(10px, 1.2vw, 13px);
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; font-weight: 700;
        }
        .menu-trigger:hover { background: var(--digit-color); color: #000; box-shadow: 0 0 20px var(--digit-color); }

        .dropdown-menu {
            display: none; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%); background: rgba(0, 5, 15, 0.98);
            border: 1px solid var(--digit-color); width: 300px; margin-top: 10px;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu button {
            width: 100%; padding: 18px; background: none; border: none;
            color: #fff; text-align: left; font-family: 'Orbitron', sans-serif;
            font-size: 11px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* VISSZASZÁMLÁLÓ - KÖZÉPRE IGAZÍTVA, VIDEÓ SZÉLESSÉG */
        .hero-section { 
            text-align: center; 
            width: 95%; 
            max-width: 1100px; 
            margin: clamp(40px, 6vh, 80px) 0; 
            padding: clamp(40px, 6vw, 70px) 20px;
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 6px solid var(--h-red); 
            border-bottom: 6px solid var(--h-green);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .target-label {
            font-size: clamp(12px, 1.8vw, 18px); letter-spacing: 8px; 
            color: var(--h-white); margin-bottom: clamp(30px, 5vh, 50px); 
            text-transform: uppercase; font-weight: 900;
        }

        .countdown-grid {
            display: flex; 
            width: 100%;
            max-width: 950px;
            justify-content: center; /* Matematikai középpont */
            align-items: center;
            gap: clamp(10px, 2.5vw, 40px);
        }

        .time-box { 
            display: flex; flex-direction: column; align-items: center; 
            min-width: clamp(70px, 14vw, 180px);
        }

        .time-value {
            font-weight: 900; 
            font-size: clamp(55px, 15vw, 180px); 
            color: #fff; line-height: 0.8;
            text-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
        }

        .time-label {
            font-size: clamp(9px, 1.4vw, 16px); color: var(--digit-color);
            text-transform: uppercase; margin-top: 25px; letter-spacing: clamp(2px, 0.5vw, 5px); font-weight: 900;
        }

        .quartz-sep {
            font-size: clamp(40px, 10vw, 140px);
            color: var(--h-white);
            font-weight: 900;
            padding-bottom: clamp(15px, 3vw, 30px);
            opacity: 0.4;
            animation: blink 1.5s infinite;
            display: flex; align-items: center;
        }

        @keyframes blink { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.1; } }

        /* VIDEÓ KONTÉNER */
        .main-container {
            width: 95%; max-width: 1100px; background: #000;
            border: 2px solid rgba(255,255,255,0.1); padding: 8px; margin-bottom: 60px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .video-wrapper { position: relative; padding-top: 56.25%; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* CTA */
        .cta-section {
            width: 95%; max-width: 700px; padding: 60px 20px; text-align: center;
            border: 2px solid var(--h-white); margin-bottom: 80px;
            background: var(--glass); backdrop-filter: blur(10px);
        }

        .cta-btn {
            display: inline-block; background: var(--h-white); color: #000;
            padding: 22px 60px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 4px; text-decoration: none; font-size: clamp(16px, 2vw, 20px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cta-btn:hover { background: var(--digit-color); transform: scale(1.1); box-shadow: 0 0 30px var(--digit-color); }

        footer { width: 100%; padding: 50px; background: rgba(0,0,0,0.9); font-size: 11px; letter-spacing: 6px; text-align: center; }

        /* MOBIL OPTIMALIZÁLÁS */
        @media (max-width: 768px) {
            .countdown-grid {
                display: grid;
                grid-template-columns: 1fr 1fr; 
                gap: 40px 10px;
            }
            .quartz-sep { display: none; } 
            .time-value { font-size: clamp(70px, 22vw, 130px); }
            .hero-section { padding: 40px 10px; width: 98%; }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="bg-overlay-fix"></div>

    <header>
        <div class="nav-container">
            <div style="position: relative;">
                <button class="menu-trigger" onclick="toggleM('tisza')">TISZA PÁRT ▼</button>
                <div id="tisza" class="dropdown-menu">
                    <button onclick="changeV('uMkgzjdHLLU')">KAMPÁNY START - TALÁLKOZÓ</button>
                    <button onclick="changeV('7IC-7l9JOcQ')">ÉLŐ KÖZVETÍTÉS</button>
                </div>
            </div>
            <div style="position: relative;">
                <button class="menu-trigger" onclick="toggleM('influ')">INFLUENSZEREK ▼</button>
                <div id="influ" class="dropdown-menu">
                    <button onclick="changeV('ApQLK2-mB0w')">JUHI</button>
                    <button onclick="changeV('fsv5WlC1oLE')">FÓKUSZCSOPORT</button>
                </div>
            </div>
        </div>
    </header>

    <main class="hero-section">
        <div class="target-label">RENDSZERVÁLTÁS: 2026. ÁPRILIS 12.</div>
        <div class="countdown-grid">
            <div class="time-box">
                <span class="time-value" id="d">00</span>
                <span class="time-label">Nap</span>
            </div>
            <span class="quartz-sep">:</span>
            <div class="time-box">
                <span class="time-value" id="h">00</span>
                <span class="time-label">Óra</span>
            </div>
            <span class="quartz-sep">:</span>
            <div class="time-box">
                <span class="time-value" id="m">00</span>
                <span class="time-label">Perc</span>
            </div>
            <span class="quartz-sep">:</span>
            <div class="time-box">
                <span class="time-value" id="s">00</span>
                <span class="time-label">Mp</span>
            </div>
        </div>
    </main>

    <div class="main-container">
        <div class="video-wrapper">
            <iframe id="player" src="https://www.youtube.com/embed/uMkgzjdHLLU?enablejsapi=1" allowfullscreen></iframe>
        </div>
    </div>

    <section class="cta-section">
        <h2 style="margin-bottom: 25px; font-size: clamp(20px, 3vw, 28px); letter-spacing: 3px;">KÜLFÖLDÖN ÉLSZ?</h2>
        <p style="margin-bottom: 40px; opacity: 0.9;">Legyen beleszólásod a hazád jövőjébe!</p>
        <a href="https://szavazzhaza.hu/" target="_blank" class="cta-btn">SZAVAZZ HAZA! ➔</a>
    </section>

    <footer>© 2026 RENDSZER-VALTAS.HU - A JÖVŐT MI ÍRJUK</footer>

    <script>
        function toggleM(id) {
            const m = document.getElementById(id);
            const is = m.classList.contains('show');
            document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show'));
            if(!is) m.classList.add('show');
        }

        window.onclick = e => { if (!e.target.matches('.menu-trigger')) document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show')); }

        function changeV(id) {
            document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        }

        const target = new Date(2026, 3, 12, 0, 0, 0).getTime();
        
        function update() {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff < 0) return;

            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
