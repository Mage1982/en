<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>RENDSZERVÁLTÁS 2026</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --digit-color: #00f2ff;
            --h-red: #ce1126;
            --h-green: #008751;
            --h-white: #ffffff;
            --bg-dark: #000205;
            --glass: rgba(0, 4, 10, 0.9);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: white;
            /* A menü és a törzsszöveg ékezetbarát Rajdhani lett */
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* A számok maradnak Orbitronban, mert ott nincs ékezet, és jól néz ki */
        .time-value { font-family: 'Orbitron', sans-serif; font-weight: 900; }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background-image: url('social.jpg');
            background-size: cover; background-position: center; 
            opacity: 0.15;
        }

        .bg-overlay-fix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 100%);
        }

        header {
            width: 100%; padding: 20px; position: fixed; top: 0; z-index: 2000;
            display: flex; justify-content: flex-end; align-items: center;
        }

        .nav-toggle {
            cursor: pointer; width: 45px; height: 35px;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 3000; background: none; border: none; padding: 5px;
        }

        .nav-toggle span {
            display: block; width: 100%; height: 3px;
            background: var(--digit-color);
            transition: var(--transition);
            box-shadow: 0 0 12px var(--digit-color);
        }

        .nav-toggle.active span:nth-child(1) { transform: translateY(11px) rotate(45deg); }
        .nav-toggle.active span:nth-child(2) { opacity: 0; }
        .nav-toggle.active span:nth-child(3) { transform: translateY(-11px) rotate(-45deg); }

        .full-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 2, 5, 0.98);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 2500;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: var(--transition);
        }

        .full-menu.open { opacity: 1; visibility: visible; }
        .menu-content { width: 90%; max-width: 800px; text-align: center; }
        
        .menu-links { display: flex; flex-direction: column; gap: 20px; align-items: center; }

        .full-menu a, .full-menu button {
            background: transparent; border: 1px solid var(--digit-color);
            color: var(--digit-color); padding: 15px 40px;
            font-family: 'Rajdhani', sans-serif; font-size: 20px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 4px;
            transition: 0.3s; font-weight: 700; text-decoration: none;
            width: 300px;
        }

        .full-menu a:hover, .full-menu button:hover {
            background: var(--digit-color); color: #000;
            box-shadow: 0 0 25px var(--digit-color);
        }

        .hero-section { 
            text-align: center; width: 95%; max-width: 1100px; 
            margin: 120px 0 40px 0; padding: clamp(30px, 6vw, 60px) 10px;
            background: var(--glass); backdrop-filter: blur(25px);
            border-top: 6px solid var(--h-red); border-bottom: 6px solid var(--h-green);
            box-shadow: 0 50px 100px rgba(0,0,0,0.95);
        }
        
        .target-label { font-size: clamp(12px, 2vw, 18px); letter-spacing: 5px; color: var(--h-white); margin-bottom: 30px; font-weight: 700; }
        .countdown-grid { display: flex; width: 100%; justify-content: center; align-items: center; gap: 10px; }
        .time-box { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
        .time-value { font-size: clamp(45px, 12vw, 150px); color: #fff; line-height: 0.8; text-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
        .time-label { font-size: 12px; color: var(--digit-color); text-transform: uppercase; margin-top: 15px; letter-spacing: 3px; font-weight: 700; }

        /* Blog Szekció Stílusa */
        .blog-container { width: 95%; max-width: 1100px; margin-bottom: 50px; }
        .blog-post { 
            background: rgba(255,255,255,0.03); border-left: 4px solid var(--h-red); 
            padding: 30px; margin-bottom: 20px; transition: 0.3s;
        }
        .blog-post:hover { background: rgba(255,255,255,0.07); }
        .blog-date { color: var(--digit-color); font-weight: 700; font-size: 14px; letter-spacing: 2px; }
        .blog-title { font-size: 24px; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        .blog-excerpt { opacity: 0.8; line-height: 1.6; font-size: 17px; }

        .section-title {
            width: 100%; max-width: 1100px; margin: 60px 0 20px 0;
            border-left: 5px solid var(--digit-color); padding-left: 20px;
            font-size: 24px; letter-spacing: 5px; text-transform: uppercase; font-weight: 700;
        }

        .cta-btn {
            display: inline-block; background: var(--h-white); color: #000;
            padding: 20px 45px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 3px; text-decoration: none; font-size: 16px;
            transition: 0.3s; font-family: 'Rajdhani', sans-serif;
        }
        .cta-btn:hover { background: var(--digit-color); box-shadow: 0 10px 30px var(--digit-color); }

        footer { width: 100%; padding: 40px; background: #000; font-size: 11px; letter-spacing: 4px; text-align: center; opacity: 0.6; }

        @media (max-width: 850px) {
            .countdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
            .time-value { font-size: 80px; }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="bg-overlay-fix"></div>

    <header>
        <button class="nav-toggle" id="navToggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
    </header>

    <nav class="full-menu" id="fullMenu">
        <div class="menu-content">
            <div class="menu-links">
                <a href="#home" onclick="toggleMenu()">Főoldal</a>
                <a href="#blog" onclick="toggleMenu()">Tények és Hírek</a>
                <a href="https://szavazzhaza.hu/" target="_blank">Szavazz Haza!</a>
                <button onclick="toggleMenu()" style="border:none; font-size: 14px; opacity: 0.5;">[ Bezárás ]</button>
            </div>
        </div>
    </nav>

    <main class="hero-section" id="home">
        <div class="target-label">A RENDSZERVÁLTÁS TÉNYE ELKERÜLHETETLEN:</div>
        <div class="countdown-grid">
            <div class="time-box"><span class="time-value" id="d">00</span><span class="time-label">Nap</span></div>
            <div class="time-box"><span class="time-value" id="h">00</span><span class="time-label">Óra</span></div>
            <div class="time-box"><span class="time-value" id="m">00</span><span class="time-label">Perc</span></div>
            <div class="time-box"><span class="time-value" id="s">00</span><span class="time-label">Másodperc</span></div>
        </div>
    </main>

    <div class="section-title" id="blog">Legfrissebb jelentések</div>
    <div class="blog-container" id="blog-feed">
        </div>

    <section style="margin: 40px 0 80px 0; text-align: center;">
        <a href="https://szavazzhaza.hu/" target="_blank" class="cta-btn">Csatlakozz a változáshoz ➔</a>
    </section>

    <footer>© 2026 RENDSZER-VALTAS.HU — MINDEN JOG FENNTARTVA</footer>

    <script>
        // BLOG POSZTOK KEZELÉSE
        const posztok = [
            {
                datum: "2026. MÁRCIUS 12.",
                cim: "Az elszámoltatás menetrendje",
                leiras: "A mai napon nyilvánosságra hoztuk a következő kormány első 100 napjának jogi kereteit. Nincs több kibúvó, az idő pörög."
            },
            {
                datum: "2026. MÁRCIUS 10.",
                cim: "Külföldi magyarok mozgósítása",
                leiras: "Rekordmennyiségű regisztráció érkezett a Szavazz Haza rendszerébe. A rendszerváltás tényét már a határokon túl is érzik."
            }
        ];

        function renderBlog() {
            const feed = document.getElementById('blog-feed');
            feed.innerHTML = posztok.map(p => `
                <article class="blog-post">
                    <div class="blog-date">${p.datum}</div>
                    <h2 class="blog-title">${p.cim}</h2>
                    <p class="blog-excerpt">${p.leiras}</p>
                </article>
            `).join('');
        }

        // MENÜ ÉS VISSZASZÁMLÁLÓ
        function toggleMenu() {
            document.getElementById('navToggle').classList.toggle('active');
            document.getElementById('fullMenu').classList.toggle('open');
        }

        const target = new Date(2026, 3, 12, 0, 0, 0).getTime();
        function update() {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff < 0) return;
            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }

        setInterval(update, 1000);
        update();
        renderBlog();
    </script>
</body>
</html>
