<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>RENDSZERVÁLTÁS 2026</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --digit-color: #00f2ff;
            --h-red: #ce1126;
            --h-green: #008751;
            --h-white: #ffffff;
            --bg-dark: #000205;
            --glass: rgba(0, 4, 10, 0.9);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background-image: url('bg.png'); /* Changed from social.jpg to bg.png */
            background-size: cover; background-position: center; 
            opacity: 0.25;
        }

        .bg-overlay-fix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 100%);
        }

        header {
            width: 100%; padding: 20px; position: fixed; top: 0; z-index: 2000;
            display: flex; justify-content: flex-end; align-items: center;
        }

        .nav-toggle {
            cursor: pointer; width: 45px; height: 35px;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 3000; background: none; border: none; padding: 5px;
        }

        .nav-toggle span {
            display: block; width: 100%; height: 3px;
            background: var(--digit-color);
            transition: var(--transition);
            box-shadow: 0 0 12px var(--digit-color);
        }

        .nav-toggle.active span:nth-child(1) { transform: translateY(11px) rotate(45deg); }
        .nav-toggle.active span:nth-child(2) { opacity: 0; }
        .nav-toggle.active span:nth-child(3) { transform: translateY(-11px) rotate(-45deg); }

        .full-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 2, 5, 0.98);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 2500;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: var(--transition);
        }

        .full-menu.open { opacity: 1; visibility: visible; }
        .menu-content { width: 90%; max-width: 800px; text-align: center; display: flex; flex-direction: column; gap: 40px; }
        .menu-section { margin-bottom: 10px; }
        .menu-label { color: var(--h-white); font-size: 11px; letter-spacing: 6px; margin-bottom: 15px; display: block; opacity: 0.5; font-weight: 700; }
        .menu-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }

        .full-menu a, .full-menu button {
            background: transparent; border: 1px solid var(--digit-color);
            color: var(--digit-color); padding: 14px 28px;
            font-family: 'Orbitron', sans-serif; font-size: 13px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
            transition: 0.3s; font-weight: 700; text-decoration: none;
        }

        .full-menu a:hover, .full-menu button:hover {
            background: var(--digit-color); color: #000;
            box-shadow: 0 0 25px var(--digit-color);
        }

        .hero-section { 
            text-align: center; width: 95%; max-width: 1100px; 
            margin: 120px 0 40px 0; padding: clamp(30px, 6vw, 60px) 10px;
            background: var(--glass); backdrop-filter: blur(25px);
            border-top: 6px solid var(--h-red); border-bottom: 6px solid var(--h-green);
            box-shadow: 0 50px 100px rgba(0,0,0,0.95);
        }
        
        .target-label { font-size: clamp(10px, 1.5vw, 14px); letter-spacing: 8px; color: var(--h-white); margin-bottom: 40px; text-transform: uppercase; font-weight: 900; }
        .countdown-grid { display: flex; width: 100%; justify-content: center; align-items: center; gap: clamp(5px, 1.5vw, 15px); }
        .time-box { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .time-value { font-weight: 900; font-size: clamp(40px, 11vw, 140px); color: #fff; line-height: 0.8; text-shadow: 0 0 30px rgba(0, 242, 255, 0.3); }
        .time-label { font-size: clamp(7px, 1vw, 12px); color: var(--digit-color); text-transform: uppercase; margin-top: 15px; letter-spacing: 3px; font-weight: 900; }
        .quartz-sep { font-size: clamp(25px, 7vw, 100px); color: var(--h-white); font-weight: 900; padding-bottom: 20px; opacity: 0.4; animation: blink 2s infinite; }

        @keyframes blink { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.1; } }

        .section-title {
            width: 100%; max-width: 1100px; margin: 40px 0 20px 0;
            border-left: 5px solid var(--digit-color); padding-left: 20px;
            font-size: clamp(18px, 3vw, 28px); letter-spacing: 5px; text-transform: uppercase;
        }

        .main-container {
            width: 95%; max-width: 1100px; background: #000;
            border: 2px solid rgba(255,255,255,0.1); padding: 8px; margin-bottom: 40px;
        }
        .video-wrapper { position: relative; padding-top: 56.25%; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .cta-section {
            width: 95%; max-width: 700px; padding: 50px 20px; text-align: center;
            border: 2px solid var(--h-white); margin-bottom: 80px; background: var(--glass);
        }

        .cta-btn {
            display: inline-block; background: var(--h-white); color: #000;
            padding: 20px 45px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 3px; text-decoration: none; font-size: clamp(12px, 1.8vw, 16px);
            transition: 0.3s;
        }
        .cta-btn:hover { background: var(--digit-color); transform: translateY(-3px); box-shadow: 0 10px 30px var(--digit-color); }

        footer { width: 100%; padding: 40px; background: #000; font-size: 9px; letter-spacing: 4px; text-align: center; opacity: 0.7; }

        @media (max-width: 850px) {
            .countdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px 10px; }
            .quartz-sep { display: none; } 
            .time-value { font-size: clamp(60px, 20vw, 110px); }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="bg-overlay-fix"></div>

    <header>
        <button class="nav-toggle" id="navToggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
    </header>

    <nav class="full-menu" id="fullMenu">
        <div class="menu-content">
            <div class="menu-section">
                <span class="menu-label">NAVIGÁCIÓ</span>
                <div class="menu-links">
                    <a href="index.html">FŐOLDAL</a>
                    <a href="blog.html" style="border-color: #fff; color: #fff;">BLOG / HÍREK</a>
                </div>
            </div>

            <div class="menu-section">
                <span class="menu-label">VIDEÓ VÁLASZTÓ</span>
                <div class="menu-links">
                    <button onclick="changeV('uMkgzjdHLLU')">Kampány Start</button>
                    <button onclick="changeV('7IC-7l9JOcQ')">Élő Adás</button>
                    <button onclick="changeV('ApQLK2-mB0w')">Juhi elemzés</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="hero-section">
        <div class="target-label">RENDSZERVÁLTÁSIG HÁTRALÉVŐ IDŐ:</div>
        <div class="countdown-grid">
            <div class="time-box"><span class="time-value" id="d">00</span><span class="time-label">Nap</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="h">00</span><span class="time-label">Óra</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="m">00</span><span class="time-label">Perc</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="s">00</span><span class="time-label">Mp</span></div>
        </div>
    </main>

    <div class="section-title">KIEMELT VIDEÓ</div>
    <div class="main-container">
        <div class="video-wrapper">
            <iframe id="player" src="https://www.youtube.com/embed/uMkgzjdHLLU?enablejsapi=1" allowfullscreen></iframe>
        </div>
    </div>

    <section class="cta-section">
        <h2 style="margin-bottom: 30px; font-size: 20px; letter-spacing: 3px;">KÜLFÖLDÖN ÉLSZ?</h2>
        <a href="https://szavazzhaza.hu/" target="_blank" class="cta-btn">SZAVAZZ HAZA! ➔</a>
    </section>

    <footer>© 2026 RENDSZER-VALTAS.HU</footer>

    <script>
        function toggleMenu() {
            const btn = document.getElementById('navToggle');
            const menu = document.getElementById('fullMenu');
            btn.classList.toggle('active');
            menu.classList.toggle('open');
            document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : 'auto';
        }

        function changeV(id) {
            document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            toggleMenu();
            setTimeout(() => {
                window.scrollTo({ 
                    top: document.querySelector('.main-container').offsetTop - 100, 
                    behavior: 'smooth' 
                });
            }, 300);
        }

        const target = new Date(2026, 3, 12, 0, 0, 0).getTime();
        function update() {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff < 0) return;
            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
