<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>RENDSZERVÁLTÁS 2026</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <meta property="og:title" content="RENDSZERVÁLTÁS 2026">
    <meta property="og:image" content="https://rendszer-valtas.hu/social.jpg">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --digit-color: #00f2ff;
            --h-red: #ce1126;
            --h-green: #008751;
            --h-white: #ffffff;
            --bg-dark: #000205;
            --glass: rgba(0, 4, 10, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background-image: url('social.jpg');
            background-size: cover; background-position: center; 
            opacity: 0.25;
        }

        .bg-overlay-fix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 100%);
        }

        header {
            width: 100%; padding: 15px 0; position: sticky; top: 0; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--h-white);
        }

        .nav-container { 
            display: flex; justify-content: center; flex-wrap: wrap; gap: clamp(5px, 2vw, 20px); 
            max-width: 1200px; margin: 0 auto; padding: 0 10px;
        }

        .menu-trigger, .nav-link {
            background: transparent; border: 1px solid var(--digit-color);
            color: var(--digit-color); padding: 10px 20px;
            font-family: 'Orbitron', sans-serif; font-size: clamp(9px, 1.1vw, 12px);
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; font-weight: 700; text-decoration: none;
            display: inline-block;
        }

        .menu-trigger:hover, .nav-link:hover { background: rgba(0, 242, 255, 0.1); }

        .dropdown-menu {
            display: none; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%); background: rgba(0, 5, 15, 0.98);
            border: 1px solid var(--digit-color); width: 250px; margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu button {
            width: 100%; padding: 15px; background: none; border: none;
            color: #fff; text-align: left; font-family: 'Orbitron', sans-serif;
            font-size: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .hero-section { 
            text-align: center; width: 95%; max-width: 1100px; 
            margin: 40px 0; padding: clamp(30px, 6vw, 60px) 10px;
            background: var(--glass); backdrop-filter: blur(25px);
            border-top: 6px solid var(--h-red); border-bottom: 6px solid var(--h-green);
            box-shadow: 0 50px 100px rgba(0,0,0,0.95);
        }
        
        .target-label {
            font-size: clamp(10px, 1.5vw, 14px); letter-spacing: 8px; 
            color: var(--h-white); margin-bottom: 40px; text-transform: uppercase; font-weight: 900;
        }

        .countdown-grid { display: flex; width: 100%; justify-content: center; align-items: center; gap: clamp(5px, 1.5vw, 15px); }
        .time-box { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .time-value { font-weight: 900; font-size: clamp(40px, 11vw, 140px); color: #fff; line-height: 0.8; text-shadow: 0 0 30px rgba(0, 242, 255, 0.3); }
        .time-label { font-size: clamp(7px, 1vw, 12px); color: var(--digit-color); text-transform: uppercase; margin-top: 15px; letter-spacing: 3px; font-weight: 900; }
        .quartz-sep { font-size: clamp(25px, 7vw, 100px); color: var(--h-white); font-weight: 900; padding-bottom: 20px; opacity: 0.4; animation: blink 2s infinite; }

        @keyframes blink { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.1; } }

        .section-title {
            width: 100%; max-width: 1100px; margin: 60px 0 30px 0;
            border-left: 5px solid var(--digit-color); padding-left: 20px;
            font-size: clamp(18px, 3vw, 28px); letter-spacing: 5px; text-transform: uppercase;
        }

        .main-container {
            width: 95%; max-width: 1100px; background: #000;
            border: 2px solid rgba(255,255,255,0.1); padding: 8px; margin-bottom: 40px;
        }
        .video-wrapper { position: relative; padding-top: 56.25%; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px; width: 95%; max-width: 1200px; margin-bottom: 80px;
        }

        .news-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; overflow: hidden;
            transition: 0.3s;
            min-height: 500px;
        }
        .news-card:hover { border-color: var(--digit-color); transform: translateY(-5px); }

        .cta-section {
            width: 95%; max-width: 700px; padding: 50px 20px; text-align: center;
            border: 2px solid var(--h-white); margin-bottom: 80px;
            background: var(--glass);
        }

        .cta-btn {
            display: inline-block; background: var(--h-white); color: #000;
            padding: 20px 45px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 3px; text-decoration: none; font-size: clamp(12px, 1.8vw, 16px);
            transition: 0.3s;
        }
        .cta-btn:hover { background: var(--digit-color); transform: translateY(-3px); box-shadow: 0 10px 30px var(--digit-color); }

        footer { width: 100%; padding: 40px; background: #000; font-size: 9px; letter-spacing: 4px; text-align: center; opacity: 0.7; }

        @media (max-width: 850px) {
            .countdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px 10px; }
            .quartz-sep { display: none; } 
            .time-value { font-size: clamp(60px, 20vw, 110px); }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="bg-overlay-fix"></div>

    <header>
        <nav class="nav-container">
            <div style="position: relative;">
                <button class="menu-trigger" onclick="toggleM('tisza')">TISZA PÁRT ▼</button>
                <div id="tisza" class="dropdown-menu">

                    <button onclick="changeV('7IC-7l9JOcQ')">ÉLŐ ADÁS</button>

            <div style="position: relative;">
                <button class="menu-trigger" onclick="toggleM('influ')">INFLUENSZEREK ▼</button>
                <div id="influ" class="dropdown-menu">
                    <button onclick="changeV('ApQLK2-mB0w')">JUHI</button>
                    <button onclick="changeV('fsv5WlC1oLE')">FÓKUSZCSOPORT</button>
                </div>
            </div>
            <a href="#hirek" class="nav-link">VÁLASZTÁSI HÍREK</a>
        </nav>
    </header>

    <main class="hero-section">

        <div class="countdown-grid">
            <div class="time-box"><span class="time-value" id="d">00</span><span class="time-label">Nap</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="h">00</span><span class="time-label">Óra</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="m">00</span><span class="time-label">Perc</span></div>
            <span class="quartz-sep">:</span>
            <div class="time-box"><span class="time-value" id="s">00</span><span class="time-label">Mp</span></div>
        </div>
    </main>

    <div class="section-title">KIEMELT VIDEÓ</div>
    <div class="main-container">
        <div class="video-wrapper">
            <iframe id="player" src="https://www.youtube.com/embed/uMkgzjdHLLU?enablejsapi=1" allowfullscreen></iframe>
        </div>
    </div>

        <div class="news-card">
            <iframe src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2Fpeter.magyar.102%2Fposts%2Fpfbid02YZKSR7eqJuWbur31eN9RRnZe62pM6FLGnBmPDCCc2oYfiwjiWW4XRNd6PCdn39p6l&show_text=true&width=500" width="100%" height="550" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true"></iframe>

        <div class="news-card">
            <iframe src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2Ftelexhu%2Fposts%2Fpfbid02RzLskR8i8U6n6KqL7wN8w9XzEwHkGvK5mRkX4RzUvN9n8RzUvN9n8RzUvN9n8&show_text=true&width=500" width="100%" height="550" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true"></iframe>

            <iframe src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2F24hu-112217158814322%2Fposts%2Fpfbid02Kx9XzEwHkGvK5mRkX4RzUvN9n8RzUvN9n8RzUvN9n8RzUvN9n8RzUvN9n8&show_text=true&width=500" width="100%" height="550" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true"></iframe>

        <div class="news-card">

    <section class="cta-section">
        <h2 style="margin-bottom: 30px; font-size: 20px; letter-spacing: 3px;">KÜLFÖLDÖN ÉLSZ?</h2>
        <a href="https://szavazzhaza.hu/" target="_blank" class="cta-btn">SZAVAZZ HAZA! ➔</a>
    </section>

    <footer>© 2026 RENDSZER-VALTAS.HU</footer>

    <script>
        function toggleM(id) {
            const m = document.getElementById(id);
            const is = m.classList.contains('show');
            document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show'));
            if(!is) m.classList.add('show');
        }

        window.onclick = e => { if (!e.target.matches('.menu-trigger')) document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show')); }

        function changeV(id) {
            document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            window.scrollTo({ top: document.querySelector('.main-container').offsetTop - 120, behavior: 'smooth' });
        }

        const target = new Date(2026, 3, 12, 0, 0, 0).getTime();
        
        function update() {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff < 0) return;

            document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }

        setInterval(update, 1000);
        update();
    </script>
