<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>RENDSZERVÁLTÁS 2026</title>
    <meta name="description" content="2026. Április 12. - A nap, amikor visszavettük a jövőnket. Kövesd a rendszerváltás óta eltelt időt!">
    <meta property="og:title" content="RENDSZERVÁLTÁS 2026">
    <meta property="og:description" content="A korszakváltás elkezdődött. Kövesd az új korszak óta eltelt időt!">
    <meta property="og:image" content="tomeg.jpg"> 
    <meta property="og:url" content="https://rendszer-valtas.hu">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-light: #00f2ff;
            --cyan-dark: #008891;
            --h-red: #ff3b3b;
            --h-green: #00ff88;
            --bg-dark: #01050a;
            --glass-hero: rgba(0, 0, 0, 0.88);
            --neon-main: 0 0 15px rgba(0, 242, 255, 0.9), 0 0 30px rgba(0, 242, 255, 0.6), 0 0 45px rgba(0, 242, 255, 0.3);
            --neon-text: 0 0 20px rgba(0, 242, 255, 0.8), 0 0 10px rgba(0, 242, 255, 0.4);
            --neon-red: 0 0 30px rgba(255, 59, 59, 1), 0 0 15px rgba(255, 59, 59, 0.6);
            --neon-box: 0 0 40px rgba(0, 242, 255, 0.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* FIX HÁTTÉR */
        .bg-overlay-fix {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100vh;
            z-index: -1; 
            background-image: linear-gradient(to bottom, rgba(1, 5, 10, 0.3), var(--bg-dark)), url('tomeg.jpg');
            background-attachment: fixed;
            background-size: 115% auto;
            background-position: center 20%;
            background-repeat: no-repeat;
        }

        /* ELSŐ KÉPERNYŐ (Hero szekció) */
        .hero-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 10px;
        }
        .hero-section { 
            text-align: center; 
            width: 100%; 
            max-width: 1200px;
            padding: 75px 20px;
            background: var(--glass-hero); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 8px solid var(--h-red); 
            border-bottom: 8px solid var(--h-green);
            box-shadow: 0 50px 100px rgba(0,0,0,0.95), var(--neon-box);
            border-radius: 12px;
            overflow: hidden;
        }
        
        /* FŐCÍM */
        .main-title {
            font-size: clamp(34px, 9vw, 115px); 
            font-weight: 900; 
            letter-spacing: 8px; 
            text-transform: uppercase;
            margin-bottom: 25px; 
            color: #fff; 
            text-shadow: var(--neon-main); 
            line-height: 1.05;
            word-break: keep-all;
        }
        .target-label {
            font-size: clamp(12px, 2.2vw, 24px); 
            letter-spacing: 2px; 
            color: var(--h-red); 
            margin-bottom: 55px; 
            text-transform: uppercase; 
            font-weight: 900; 
            text-shadow: var(--neon-red);
            line-height: 1.4;
            padding: 0 10px;
        }
        
        /* SZÁMLÁLÓ RENDSZER */
        .countdown-grid { 
            display: flex; 
            width: 100%; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            flex-wrap: nowrap; 
        }
        .time-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: 1; 
            min-width: 0; 
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 5px;
            border-radius: 6px;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .time-value { 
            font-weight: 900; 
            font-size: clamp(22px, 8vw, 130px); 
            color: #fff; 
            line-height: 0.9; 
            text-shadow: var(--neon-text); 
        }
        .time-label { 
            font-size: clamp(8px, 1.4vw, 16px); 
            color: #fff; 
            text-transform: uppercase; 
            margin-top: 10px; 
            letter-spacing: 1px; 
            font-weight: 600; 
            opacity: 0.9; 
        }
        .quartz-sep { 
            font-size: clamp(18px, 6vw, 100px); 
            color: var(--cyan-light); 
            font-weight: 900; 
            padding-bottom: 15px; 
            opacity: 0.7; 
            animation: blink 1.5s infinite; 
        }
        
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }

        /* MÁSODIK BLOKK (Videó szekció) */
        .content-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 40px 15px 100px 15px;
        }
        .video-section {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            background: rgba(1, 5, 10, 0.85); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border-radius: 12px;
            text-align: center;
        }
        .video-section h2 {
            font-size: clamp(20px, 3.5vw, 36px);
            color: var(--cyan-light);
            text-shadow: var(--neon-text);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* STÍLUSOS NEON MENÜ (Dropdown) */
        .menu-container {
            margin-bottom: 25px;
        }
        .channel-select {
            background: rgba(1, 5, 10, 0.9);
            color: var(--cyan-light);
            border: 1px solid var(--cyan-dark);
            padding: 12px 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 350px;
            text-align-last: center; /* Szöveg középre igazítása a kiválasztóban */
        }
        .channel-select:hover, .channel-select:focus {
            border-color: var(--cyan-light);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
        }
        .channel-select option {
            background: var(--bg-dark);
            color: #fff;
            padding: 10px;
        }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            padding-top: 0;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* LAPOZÓ / NAVIGÁCIÓS VEZÉRLŐK */
        .slider-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
        }
        .slider-btn {
            background: transparent;
            color: var(--cyan-light);
            border: 1px solid var(--cyan-dark);
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }
        .slider-btn:hover {
            background: var(--cyan-dark);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }
        .slider-status {
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7);
            min-width: 80px;
        }
        
        footer { 
            width: 100%; 
            text-align: center;
            padding: 30px 0;
            font-size: 11px; 
            letter-spacing: 3px; 
            opacity: 0.6; 
            font-weight: 600;
            background: rgba(1, 5, 10, 0.9);
        }

        @media (max-width: 850px) {
            .bg-overlay-fix { background-size: cover; }
            .hero-section { padding: 50px 12px; }
            .video-section { padding: 25px 10px; }
        }

        @media (max-width: 420px) {
            .main-title { font-size: clamp(28px, 9.5vw, 38px); letter-spacing: 4px; }
            .target-label { font-size: 10px; margin-bottom: 35px; }
            .time-box { padding: 10px 2px; }
            .time-label { font-size: 8px; margin-top: 5px; }
            .slider-btn { padding: 8px 15px; font-size: 12px; }
            .channel-select { font-size: 12px; padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay-fix"></div>

    <div class="hero-container">
        <main class="hero-section">
            <h1 class="main-title">RENDSZERVÁLTÁS</h1>
            <div class="target-label">A RENDSZERVÁLTÁS ÓTA ELTELT IDŐ:</div>
            
            <div class="countdown-grid">
                <div class="time-box"><span class="time-value" id="d">00</span><span class="time-label">Nap</span></div>
                <span class="quartz-sep">:</span>
                <div class="time-box"><span class="time-value" id="h">00</span><span class="time-label">Óra</span></div>
                <span class="quartz-sep">:</span>
                <div class="time-box"><span class="time-value" id="m">00</span><span class="time-label">Perc</span></div>
                <span class="quartz-sep">:</span>
                <div class="time-box"><span class="time-value" id="s">00</span><span class="time-label">Másodperc</span></div>
            </div>
        </main>
    </div>

    <div class="content-container">
        <section class="video-section">
            <h2>TÁJÉKOZÓDJ A VALÓSÁGRÓL</h2>
            
            <div class="menu-container">
                <select class="channel-select" id="channelSelector" onchange="changeChannel()">
                    <option value="jolvanez">JÓLVANEZÍGY</option>
                    <option value="juhaszpeter">Juhász Péter | Juhi</option>
                </select>
            </div>

            <div class="video-wrapper">
                <iframe id="videoPlayer" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
            
            <div class="slider-controls">
                <button class="slider-btn" onclick="prevVideo()">Előző</button>
                <span class="slider-status" id="sliderStatus">1 / 1</span>
                <button class="slider-btn" onclick="nextVideo()">Következő</button>
            </div>
        </section>
    </div>

    <footer>
        <p>© 2026 RENDSZER-VALTAS.HU</p>
    </footer>

    <script>
        // VIDEÓK ADATBÁZISA CSATORNÁNKÉNT
        const channelsData = {
            jolvanez: [
                "rGP71_s_P9M", // Balásy adás
                "8HQTp3fmsP4", // Út a munka világába adás
                "Rihdq6sF0Eo", // Hazugságverseny adás
                "fTXmxgkooX0"  // Eredeti videó az alap kódból
            ],
            juhaszpeter: [
                "71h1JhzjOM8", // Flex #03 (Juhi x Bogos Csaba)
                "7_bXy3T4W8g", // NER-fajzatok adás (példa ID)
                "u0rW8X0N_3c"  // Rogán/Havas adás (példa ID)
            ]
        };

        let currentChannel = "jolvanez";
        let currentVideoIndex = 0;
        
        const player = document.getElementById('videoPlayer');
        const statusText = document.getElementById('sliderStatus');
        const channelSelector = document.getElementById('channelSelector');

        function loadVideo(index) {
            const currentList = channelsData[currentChannel];
            currentVideoIndex = index;
            
            // Beágyazás frissítése a kiválasztott csatorna listájából
            player.src = `https://www.youtube.com/embed/${currentList[currentVideoIndex]}?rel=0`;
            statusText.innerText = `${currentVideoIndex + 1} / ${currentList.length}`;
        }

        function nextVideo() {
            const currentList = channelsData[currentChannel];
            let nextIndex = currentVideoIndex + 1;
            if (nextIndex >= currentList.length) nextIndex = 0;
            loadVideo(nextIndex);
        }

        function prevVideo() {
            const currentList = channelsData[currentChannel];
            let prevIndex = currentVideoIndex - 1;
            if (prevIndex < 0) prevIndex = currentList.length - 1;
            loadVideo(prevIndex);
        }

        // Amikor a felhasználó csatornát vált a menüben
        function changeChannel() {
            currentChannel = channelSelector.value;
            loadVideo(0); // Új csatorna esetén az első videóval kezdünk
        }

        // Kezdő inicializálás az első betöltéskor
        loadVideo(0);


        // IDŐZÍTŐ SCRIPT
        const target = new Date("2026/04/12 06:00:00").getTime();
        
        function update() {
            const now = new Date().getTime();
            const diff = now - target;
            const absoluteDiff = Math.abs(diff);

            const d = Math.floor(absoluteDiff / (1000 * 60 * 60 * 24));
            const h = Math.floor((absoluteDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((absoluteDiff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((absoluteDiff % (1000 * 60)) / 1000);

            document.getElementById('d').innerText = d.toString().padStart(2, '0');
            document.getElementById('h').innerText = h.toString().padStart(2, '0');
            document.getElementById('m').innerText = m.toString().padStart(2, '0');
            document.getElementById('s').innerText = s.toString().padStart(2, '0');
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
